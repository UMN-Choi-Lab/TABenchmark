# Scenario ladder rung 5: Honolulu (Xu et al. 2024), the cross-domain axis.
# First real, OSM-derived US-city instance (adr-006's promised cross-domain
# axis, adr-033). Data are downloaded on demand (per-file SHA-256, whole-zip
# md5-pinned) - never vendored (P9). CC BY 4.0; cite the source (below).
scenario: xu2024-honolulu
source: xu2024
family: xu2024-honolulu
tasks: [t1_equilibrium]
dimensions:
  zones: 117
  nodes: 2982
  links: 11205
  bpr: {alpha: 0.5, beta: 1.5}   # per-city calibrated (paper Table 5), uniform
oracle:
  kind: published-reference        # NOT best-known: a LOOSE published cross-check
  file: 03_AequilibraE_results/assignment_result.csv (matrix_ab)
  relative_gap: 1.04e-3            # the published AequilibraE run's own gap
  note: >
    Published AequilibraE UE flows. Their own relative gap is ~1e-3 (~11 orders
    looser than a TNTP best-known), so they are a provenance cross-check, never
    a regression oracle. The repo's own bfw certifies a far tighter gap on this
    identical instance (cross-implementation agreement): rgap ~1e-4 with
    correlation 0.99992 to the published flows (adr-033 / VALIDATION.md).
known_defect: >
  AS-PUBLISHED wrong-centroid instance (P2). The dataset's AequilibraE runs
  injected OD demand at node ids 1..Z instead of the intended tract centroids
  (median 6.4 km off; the authors' own AequilibraE_assignment.py calls
  g.prepare_graph(np.arange(zones)+1)). The instance shipped here reproduces
  that as-published 1..Z-centroid graph: it is self-consistent (flows conserve
  and equilibrate) but is a DIFFERENT instance from the dataset's TransCAD
  side, which used the correct centroids. Cross-solver agreement against the
  published TransCAD flows is NOT claimed. The corrected tract-centroid variant
  is deferred (adr-033, future work).
units:
  free_flow_time: minutes
  capacity: vehicles/hour
  demand: vehicles/hour AM peak (0.6 x the input od.csv)
budgets:
  iterations: 400   # local/nightly rung; bfw rgap ~1e-4 in ~100 s (measured 104.5 s on the dev box)
citation: >
  Xu, X., Zheng, Z., Hu, Z., Feng, K. & Ma, W. (2024). A unified dataset for the
  city-scale traffic assignment model in 20 U.S. cities. Scientific Data 11:325,
  DOI 10.1038/s41597-024-03149-8. Data: figshare
  https://doi.org/10.6084/m9.figshare.24235696 (v4, file 48908890), CC BY 4.0.
