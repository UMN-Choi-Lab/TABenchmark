# T2 within-day DYNAMIC estimation on the built-in Braess network (ADR-023):
# recover the (H, Z, Z) time-slice OD profile from time-sliced link counts linked
# by the frozen free-flow lag map. The bypass path 1->3->4->2 puts link 4 (4->2)
# a fractional slice downstream (tau=10, slice_length=7 -> lags 1 and 2), so the
# simultaneous estimator can revise a slice from its later counts while the
# sequential one (earliest interval, frozen) cannot -- od-dynamic-sim recovers a
# lower od_rmse than od-dynamic-seq. Hand-checkable; single OD pair.
scenario: braess
source: builtin
family: builtin-braess
tasks: [t2_dynamic_estimation]
estimation:
  data_level: dynamic_link_counts
  map: frozen_freeflow_v1
  n_slices: 3            # H departure slices
  slice_length: 7.0      # Delta (native time units); tau_{4->2}=10 -> fractional lag
  sensors: {kind: explicit, links: [2, 4]}   # 3->4 (lag 0), 4->2 (fractional)
  heldout: {kind: explicit, links: [0]}       # 1->3 (disjoint), the ranking column
  n_days: 12
  noise: poisson
  prior: {kind: stale, cv: 0.30}
  identifiability: reported
budgets:
  sp_calls: 2000
