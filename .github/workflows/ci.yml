name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Cache benchmark data
        uses: actions/cache@v4
        with:
          path: ~/.cache/tabench
          key: tabench-data-${{ hashFiles('src/tabench/data/registry.py', 'src/tabench/data/xu2024.py', 'src/tabench/data/bo4mob.py') }}
          restore-keys: tabench-data-
      - name: Install
        # viz extra (matplotlib) on BOTH matrix legs so tests/test_viz.py runs on
        # 3.10 + 3.12; the module is optional but its tests must not silently skip in CI.
        # tutorials extra (nbclient/nbformat/ipykernel) drives TABENCH_RUN_TUTORIALS=1
        # notebook execution below, 3.12 leg only.
        run: pip install -e ".[dev,viz,tutorials]"
      - name: Fetch benchmark data
        # Explicit prefetch: a failed download fails the job, and a failed
        # job saves no cache — so a partially-populated cache can never be
        # frozen in by an exact-key hit. The xu2024 cross-domain axis (adr-033)
        # is a SEPARATE registry, NOT in REGISTRY: only its two CI-sized rungs
        # (Honolulu + San Francisco) are prefetched here, each by HTTP byte-range
        # of ~1 MB (NOT the 276 MB zip); the other 15 cities are never CI-fetched.
        run: >
          python -c "from tabench.data.registry import REGISTRY;
          from tabench.data.fetcher import fetch;
          from tabench.data.xu2024 import XU2024_REGISTRY, XU2024_RUNGS, fetch_city;
          [fetch(s) for s in REGISTRY.values()];
          [fetch_city(XU2024_REGISTRY[c]) for c in XU2024_RUNGS]"
      - name: Lint
        run: ruff check src tests demos
      - name: Test
        run: pytest -q -ra
        env:
          # Data failures must fail CI, never silently skip (tests/conftest.py).
          TABENCH_REQUIRE_DATA: "1"
          # Notebook execution (test_notebook_executes) on the 3.12 leg only —
          # kernel-start cost x2 legs buys nothing the 3.10 leg's unconditional
          # existence/stripping/metadata checks in tests/test_tutorials.py don't
          # already cover. Empty string is falsy for the test's os.environ.get
          # check, so 3.10 skips cleanly (adr-035 Decision C).
          TABENCH_RUN_TUTORIALS: ${{ matrix.python-version == '3.12' && '1' || '' }}

  # Optional torch models (implicit-ue-nn, het-gnn), py3.12 only. The torch-free
  # matrix above is the live regression that `import tabench` works without torch,
  # so this job installs the CPU-only torch build and runs ONLY the torch test
  # files (the 731-test numpy suite is already covered twice by the matrix).
  torch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Cache pip (torch wheel is ~200 MB — not covered by the data cache)
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-torch-${{ hashFiles('pyproject.toml') }}
          restore-keys: pip-torch-
      - name: Cache benchmark data
        uses: actions/cache@v4
        with:
          path: ~/.cache/tabench
          key: tabench-data-${{ hashFiles('src/tabench/data/registry.py', 'src/tabench/data/xu2024.py', 'src/tabench/data/bo4mob.py') }}
          restore-keys: tabench-data-
      - name: Install CPU-only torch
        # The +cpu local version satisfies torch>=2.4, so the editable install
        # below will not re-resolve it to the multi-GB CUDA wheel.
        run: pip install torch --index-url https://download.pytorch.org/whl/cpu
      - name: Install
        # tutorials extra (nbclient/nbformat/ipykernel) needed for the notebook
        # step below — without it test_notebook_executes' importorskip would
        # silently skip instead of executing.
        run: pip install -e ".[dev,torch,tutorials]"
      - name: Fetch benchmark data
        run: >
          python -c "from tabench.data.registry import REGISTRY;
          from tabench.data.fetcher import fetch;
          [fetch(s) for s in REGISTRY.values()]"
      - name: Test (torch models only)
        # Explicit two-file list, no glob: het-gnn is the last Phase-3 torch
        # model, so the set is closed — a marker/subdir would churn a shipped
        # file's path for zero future benefit (adr-026).
        run: pytest tests/test_implicit_ue.py tests/test_het_gnn.py -q -ra
        env:
          TABENCH_REQUIRE_DATA: "1"
      - name: Test (torch tutorial notebooks)
        # A SEPARATE step, not appended to the file list above: -k applies to
        # the whole pytest invocation, so combining it with the untargeted
        # torch-model tests would deselect them (they don't match the
        # notebook-path keywords). -k scopes execution to just the two
        # torch-gated notebooks; the rest of the suite already ran on the
        # core 3.12 leg (adr-035 Decision C).
        run: pytest tests/test_tutorials.py -k "implicit-ue-nn or het-gnn" -q -ra
        env:
          TABENCH_REQUIRE_DATA: "1"
          TABENCH_RUN_TUTORIALS: "1"

  # Optional SUMO adapter (sumo-marouter), py3.12 only. The sumo-free matrix
  # above is the live regression that `import tabench` works without the wheel,
  # so this job installs the eclipse-sumo wheel and runs ONLY the sumo test file.
  # Kept separate from the torch job so a break in either dependency's ~150 MB
  # download cannot kill the other's signal (adr-027).
  sumo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Cache pip (eclipse-sumo wheel is ~150 MB — not covered by the data cache)
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-sumo-${{ hashFiles('pyproject.toml') }}
          restore-keys: pip-sumo-
      - name: Cache benchmark data
        uses: actions/cache@v4
        with:
          path: ~/.cache/tabench
          key: tabench-data-${{ hashFiles('src/tabench/data/registry.py', 'src/tabench/data/xu2024.py', 'src/tabench/data/bo4mob.py') }}
          restore-keys: tabench-data-
      - name: Install pinned eclipse-sumo
        # Pin the version in the WORKFLOW (not the pyproject floor): marouter's
        # vdf/capacity tables are hardcoded upstream, so the mapping-floor anchors
        # are pinned to 1.27.1. sumo-data is pinned too (it ships the $SUMO_HOME
        # XSDs/typemaps and only floats behind eclipse-sumo otherwise). Installed
        # first so the editable install below does not re-resolve them.
        run: pip install eclipse-sumo==1.27.1 sumo-data==1.27.1
      - name: Install
        # tutorials extra (nbclient/nbformat/ipykernel) needed for the notebook
        # step below — without it test_notebook_executes' importorskip would
        # silently skip instead of executing.
        run: pip install -e ".[dev,sumo,tutorials]"
      - name: Fetch benchmark data
        # Also prefetch the BO4Mob 1ramp single-evaluation bundle (~27 KB, adr-034),
        # the only instance whose od2trips + mesoscopic-SUMO pipeline the smoke test
        # runs. BO4MOB_REGISTRY is a SEPARATE registry (NOT in REGISTRY), so nothing
        # else in the family is CI-fetched; the four small instances are on demand
        # and 5fullRegion (74 MB, HPC-only) refuses to fetch.
        run: >
          python -c "from tabench.data.registry import REGISTRY;
          from tabench.data.fetcher import fetch;
          from tabench.data.bo4mob import BO4MOB_REGISTRY, BO4MOB_SMOKE, fetch_bo4mob;
          [fetch(s) for s in REGISTRY.values()];
          fetch_bo4mob(BO4MOB_REGISTRY[BO4MOB_SMOKE])"
      - name: Test (sumo adapter + spsa-sumo estimator + bo4mob pipeline liveness)
        # Explicit file list (the torch-job precedent): the sumo dependency's test
        # surface is the marouter adapter (adr-027), the SPSA-in-the-loop estimator
        # built on it (adr-028), the BO4Mob mesoscopic-pipeline smoke test
        # (adr-034), and the first EDOC-1 dynamic row sumo-duaiterate (adr-036/037 —
        # drives duaIterate + the pinned meso replay + duarouter R3 end to end); the
        # numpy suite (incl. the engine-free EDOC substrate) is covered by the
        # sumo-free matrix legs.
        run: pytest tests/test_sumo_marouter.py tests/test_spsa_sumo.py tests/test_bo4mob.py tests/test_sumo_duaiterate.py -q -ra
        env:
          TABENCH_REQUIRE_DATA: "1"
      - name: Test (sumo tutorial notebooks)
        # A SEPARATE step (torch-job precedent above): -k scopes execution to
        # the three sumo-gated notebooks only. bo4mob's own tutorial has just
        # one OPTIONALLY sumo-gated cell (a soft try/except, not a hard guard),
        # so it already executes unconditionally on the core 3.12 leg and is
        # not repeated here.
        run: pytest tests/test_tutorials.py -k "sumo-marouter or spsa-sumo or sumo-duaiterate" -q -ra
        env:
          TABENCH_REQUIRE_DATA: "1"
          TABENCH_RUN_TUTORIALS: "1"

  # Optional DTALite adapters — dtalite-tap (adr-029, static assignment()) AND
  # dtalite-simulation (adr-040, the mesoscopic simulation() EDOC row) — py3.12 only.
  # ONE job for BOTH rows: same 1.3 MB wheel, same DTALite==0.8.1 pin, same failure
  # domain (a sixth-job clone would duplicate setup to isolate nothing — adr-029's
  # per-DEPENDENCY isolation is already served). The dtalite-free matrix above is the
  # live regression that `import tabench` (and the dtalite-simulation module, which
  # imports without the wheel) works without the extra. Kept separate from the
  # sumo/torch jobs so a break in any one dependency cannot kill the others' signal.
  # NO pip-cache step: the wheel has no dependencies, so cache overhead exceeds the download.
  dtalite:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Cache benchmark data
        uses: actions/cache@v4
        with:
          path: ~/.cache/tabench
          key: tabench-data-${{ hashFiles('src/tabench/data/registry.py', 'src/tabench/data/xu2024.py', 'src/tabench/data/bo4mob.py') }}
          restore-keys: tabench-data-
      - name: Install pinned DTALite
        # Pin the version in the WORKFLOW (not the pyproject floor): the FW/VDF behavior
        # is a bundled `.so` that can change upstream, so the convergence-floor anchors
        # are pinned to 0.8.1. Installed first so the editable install below does not
        # re-resolve it.
        run: pip install DTALite==0.8.1
      - name: Install
        # tutorials extra (nbclient/nbformat/ipykernel) needed for the notebook
        # step below — without it test_notebook_executes' importorskip would
        # silently skip instead of executing.
        run: pip install -e ".[dev,dtalite,tutorials]"
      - name: Fetch benchmark data
        run: >
          python -c "from tabench.data.registry import REGISTRY;
          from tabench.data.fetcher import fetch;
          [fetch(s) for s in REGISTRY.values()]"
      - name: Test (dtalite adapters)
        # Explicit file list (the torch/sumo-job precedent): the dtalite dependency's
        # test surface is the static-assignment adapter (adr-029, test_dtalite.py) AND
        # the simulation() EDOC row (adr-040, test_dtalite_simulation.py — its
        # engine-gated half un-skips here, its engine-free half already ran on the
        # matrix legs). The numpy suite is covered by the dtalite-free matrix legs.
        run: pytest tests/test_dtalite.py tests/test_dtalite_simulation.py -q -ra
        env:
          TABENCH_REQUIRE_DATA: "1"
      - name: Test (dtalite tutorial notebooks)
        # A SEPARATE step (torch-job precedent above): -k scopes execution to the
        # two dtalite-gated notebooks (dtalite-tap + dtalite-simulation).
        run: pytest tests/test_tutorials.py -k "dtalite-tap or dtalite-simulation" -q -ra
        env:
          TABENCH_REQUIRE_DATA: "1"
          TABENCH_RUN_TUTORIALS: "1"

  # Optional MATSim EDOC adapter (matsim, adr-039), py3.12 only. The engine is
  # JAVA-ONLY (no pip extra; PyPI 'matsim' is an unrelated neuronal simulator),
  # so this job installs the pinned toolchain itself: the Temurin 21.0.11+10 JDK
  # from the hard Adoptium asset URL (sha256-verified — actions/setup-java can
  # pin '21.0.11' but not the exact +10 build, so the direct download is the
  # stricter, provider-independent pin; recorded in adr-039) and the
  # matsim-2025.0 release zip (md5-verified BEFORE unzip — the supply-chain
  # gate; note the GitHub release TAG is '2025.0', the guessable 'matsim-2025.0'
  # 404s). Kept a separate job (house style) so a break in the ~315 MB of
  # downloads cannot kill the torch/sumo/dtalite signals. The matsim-free
  # matrix above is the live regression that the adapter module imports (and
  # its engine-free tests pass) without any toolchain.
  matsim:
    runs-on: ubuntu-latest
    # The two toolchain checksums live HERE as the single source of truth (S3
    # review F7): the cache key AND the verify lines both read them, so a pin
    # bump can never leave a stale cache key behind (a stale hit would skip
    # both re-download and re-verification via the presence guards below).
    env:
      MATSIM_JDK_SHA256: 4b2220e232a97997b436ca6ab15cbf70171ecff52958a46159dfa5a8c44ca4de
      MATSIM_ZIP_MD5: c65f35eafabea2456b818875f08048ca
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Cache the pinned JDK + MATSim release
        uses: actions/cache@v4
        with:
          path: ~/matsim-toolchain
          # keyed on BOTH artifact checksums (the job env above): a pin bump
          # mints a new key and re-downloads.
          key: matsim-toolchain-${{ env.MATSIM_JDK_SHA256 }}-${{ env.MATSIM_ZIP_MD5 }}
      - name: Install pinned toolchain (checksums verified before extraction)
        # curl --fail (S3 review F7): an HTTP error page must fail the download
        # itself, not surface later as a confusing checksum mismatch.
        run: |
          set -euo pipefail
          mkdir -p ~/matsim-toolchain && cd ~/matsim-toolchain
          if [ ! -x jdk-21.0.11+10/bin/java ]; then
            curl -fsSL -o jdk.tar.gz "https://github.com/adoptium/temurin21-binaries/releases/download/jdk-21.0.11%2B10/OpenJDK21U-jdk_x64_linux_hotspot_21.0.11_10.tar.gz"
            echo "$MATSIM_JDK_SHA256  jdk.tar.gz" | sha256sum -c -
            tar -xzf jdk.tar.gz && rm jdk.tar.gz
          fi
          if [ ! -f matsim-2025.0/matsim-2025.0.jar ]; then
            curl -fsSL -o matsim-2025.0-release.zip "https://github.com/matsim-org/matsim-libs/releases/download/2025.0/matsim-2025.0-release.zip"
            echo "$MATSIM_ZIP_MD5  matsim-2025.0-release.zip" | md5sum -c -
            unzip -q matsim-2025.0-release.zip && rm matsim-2025.0-release.zip
          fi
          jdk-21.0.11+10/bin/java -version
          # env: values are never shell-expanded by Actions, so export the
          # ABSOLUTE toolchain paths here (the F8 addressing rule wants them
          # absolute anyway).
          echo "TABENCH_MATSIM_HOME=$HOME/matsim-toolchain" >> "$GITHUB_ENV"
          echo "TABENCH_JAVA_HOME=$HOME/matsim-toolchain/jdk-21.0.11+10" >> "$GITHUB_ENV"
      - name: Install
        # tutorials extra (nbclient/nbformat/ipykernel) needed for the notebook
        # step below — without it test_notebook_executes' importorskip would
        # silently skip instead of executing.
        run: pip install -e ".[dev,tutorials]"
      - name: Test (matsim adapter — engine-free + engine-gated halves)
        # One file carries the row's whole surface (adr-039); the engine-gated
        # half un-skips because TABENCH_MATSIM_HOME/TABENCH_JAVA_HOME are
        # exported by the toolchain step above.
        run: pytest tests/test_matsim_edoc.py -q -ra
      - name: Test (matsim tutorial notebook)
        # A SEPARATE step (torch/sumo/dtalite-job precedent): -k scopes
        # execution to the single matsim-gated notebook.
        run: pytest tests/test_tutorials.py -k "matsim" -q -ra
        env:
          TABENCH_RUN_TUTORIALS: "1"

  # The readthedocs.io documentation site, built with warnings-as-errors. The
  # non-engine-gated tutorial notebooks EXECUTE during the build (myst-nb), so
  # this job is also an integration test of src/ — a solver change that breaks a
  # tutorial fails here — which is why it runs on EVERY PR with no paths filter
  # (a docs/**-filter would skip exactly those regressions). Kept a SEPARATE job
  # (house style, cf. the torch/sumo/dtalite split): a break in the docs
  # toolchain download cannot kill the test-matrix signal. RTD PR builds are the
  # complementary preview (org.readthedocs.build URL); this job is the merge gate,
  # so merges never wait on RTD Community's 2-build concurrency. Engine-gated
  # notebooks (torch/sumo/dtalite/matsim) are excluded from EXECUTION by
  # docs/conf.py (this job installs only .[docs,viz], and no matsim toolchain
  # is addressed); they still render un-executed.
  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12" # matches .readthedocs.yaml build.tools.python
      - name: Cache benchmark data
        # Same key as the test/torch/sumo/dtalite jobs: the executed notebooks
        # fetch the same scenarios, so they share the cache.
        uses: actions/cache@v4
        with:
          path: ~/.cache/tabench
          key: tabench-data-${{ hashFiles('src/tabench/data/registry.py', 'src/tabench/data/xu2024.py', 'src/tabench/data/bo4mob.py') }}
          restore-keys: tabench-data-
      - name: Install
        # docs = the Sphinx site toolchain; viz = matplotlib, which every
        # executed notebook draws through. NOT the torch/sumo/dtalite extras —
        # their notebooks are excluded from execution by docs/conf.py.
        run: pip install -e ".[docs,viz]"
      - name: Fetch benchmark data
        # Same prefetch discipline and set as the test job (REGISTRY + the two
        # xu2024 CI rungs + the bo4mob 1ramp smoke bundle), so a failed download
        # fails the job instead of freezing a partial cache: the 12-data
        # notebooks execute against exactly this data.
        run: >
          python -c "from tabench.data.registry import REGISTRY;
          from tabench.data.fetcher import fetch;
          from tabench.data.xu2024 import XU2024_REGISTRY, XU2024_RUNGS, fetch_city;
          from tabench.data.bo4mob import BO4MOB_REGISTRY, BO4MOB_SMOKE, fetch_bo4mob;
          [fetch(s) for s in REGISTRY.values()];
          [fetch_city(XU2024_REGISTRY[c]) for c in XU2024_RUNGS];
          fetch_bo4mob(BO4MOB_REGISTRY[BO4MOB_SMOKE])"
      - name: Build docs (warnings are errors)
        # Two steps, mirroring .readthedocs.yaml: assemble the repo-root-shaped
        # source mirror, then build with -W (the same bar as RTD's -W). -c docs
        # points at docs/conf.py while the source dir is the mirror.
        # LC_ALL: the notebook execution kernel dies on a C locale. No
        # TABENCH_REQUIRE_DATA here: it only governs pytest's conftest fetch gate,
        # not a sphinx/myst-nb build (the notebooks fetch directly), so it is inert
        # here — the "Fetch benchmark data" step above is the enforcement point (a
        # failed download fails the job before this build runs).
        env:
          LC_ALL: C.UTF-8
        run: |
          python docs/build_site.py
          python -m sphinx -T -W --keep-going -b html -c docs docs/_build/site docs/_build/html
