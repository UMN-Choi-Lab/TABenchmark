name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Cache benchmark data
        uses: actions/cache@v4
        with:
          path: ~/.cache/tabench
          key: tabench-data-${{ hashFiles('src/tabench/data/registry.py') }}
          restore-keys: tabench-data-
      - name: Install
        run: pip install -e ".[dev]"
      - name: Fetch benchmark data
        # Explicit prefetch: a failed download fails the job, and a failed
        # job saves no cache — so a partially-populated cache can never be
        # frozen in by an exact-key hit.
        run: >
          python -c "from tabench.data.registry import REGISTRY;
          from tabench.data.fetcher import fetch;
          [fetch(s) for s in REGISTRY.values()]"
      - name: Lint
        run: ruff check src tests demos
      - name: Test
        run: pytest -q -ra
        env:
          # Data failures must fail CI, never silently skip (tests/conftest.py).
          TABENCH_REQUIRE_DATA: "1"

  # Optional torch models (implicit-ue-nn, het-gnn), py3.12 only. The torch-free
  # matrix above is the live regression that `import tabench` works without torch,
  # so this job installs the CPU-only torch build and runs ONLY the torch test
  # files (the 731-test numpy suite is already covered twice by the matrix).
  torch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Cache pip (torch wheel is ~200 MB — not covered by the data cache)
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-torch-${{ hashFiles('pyproject.toml') }}
          restore-keys: pip-torch-
      - name: Cache benchmark data
        uses: actions/cache@v4
        with:
          path: ~/.cache/tabench
          key: tabench-data-${{ hashFiles('src/tabench/data/registry.py') }}
          restore-keys: tabench-data-
      - name: Install CPU-only torch
        # The +cpu local version satisfies torch>=2.4, so the editable install
        # below will not re-resolve it to the multi-GB CUDA wheel.
        run: pip install torch --index-url https://download.pytorch.org/whl/cpu
      - name: Install
        run: pip install -e ".[dev,torch]"
      - name: Fetch benchmark data
        run: >
          python -c "from tabench.data.registry import REGISTRY;
          from tabench.data.fetcher import fetch;
          [fetch(s) for s in REGISTRY.values()]"
      - name: Test (torch models only)
        # Explicit two-file list, no glob: het-gnn is the last Phase-3 torch
        # model, so the set is closed — a marker/subdir would churn a shipped
        # file's path for zero future benefit (adr-026).
        run: pytest tests/test_implicit_ue.py tests/test_het_gnn.py -q -ra
        env:
          TABENCH_REQUIRE_DATA: "1"

  # Optional SUMO adapter (sumo-marouter), py3.12 only. The sumo-free matrix
  # above is the live regression that `import tabench` works without the wheel,
  # so this job installs the eclipse-sumo wheel and runs ONLY the sumo test file.
  # Kept separate from the torch job so a break in either dependency's ~150 MB
  # download cannot kill the other's signal (adr-027).
  sumo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Cache pip (eclipse-sumo wheel is ~150 MB — not covered by the data cache)
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-sumo-${{ hashFiles('pyproject.toml') }}
          restore-keys: pip-sumo-
      - name: Cache benchmark data
        uses: actions/cache@v4
        with:
          path: ~/.cache/tabench
          key: tabench-data-${{ hashFiles('src/tabench/data/registry.py') }}
          restore-keys: tabench-data-
      - name: Install pinned eclipse-sumo
        # Pin the version in the WORKFLOW (not the pyproject floor): marouter's
        # vdf/capacity tables are hardcoded upstream, so the mapping-floor anchors
        # are pinned to 1.27.1. sumo-data is pinned too (it ships the $SUMO_HOME
        # XSDs/typemaps and only floats behind eclipse-sumo otherwise). Installed
        # first so the editable install below does not re-resolve them.
        run: pip install eclipse-sumo==1.27.1 sumo-data==1.27.1
      - name: Install
        run: pip install -e ".[dev,sumo]"
      - name: Fetch benchmark data
        run: >
          python -c "from tabench.data.registry import REGISTRY;
          from tabench.data.fetcher import fetch;
          [fetch(s) for s in REGISTRY.values()]"
      - name: Test (sumo adapter only)
        run: pytest tests/test_sumo_marouter.py -q -ra
        env:
          TABENCH_REQUIRE_DATA: "1"
