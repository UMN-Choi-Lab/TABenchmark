name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Cache benchmark data
        uses: actions/cache@v4
        with:
          path: ~/.cache/tabench
          key: tabench-data-${{ hashFiles('src/tabench/data/registry.py') }}
      - name: Install
        run: pip install -e ".[dev]"
      - name: Lint
        run: ruff check src tests demos
      - name: Test
        run: pytest -q
